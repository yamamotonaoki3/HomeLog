server:
  port: 8080

spring:
  application:
    name: api
  datasource:
    url: jdbc:postgresql://localhost:5432/homelog
    username: homelog
    password: homelog
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  web:
    resources:
      static-locations: classpath:/static/,file:./uploads/

app:
  upload:
    dir: uploads/recipes
  s3:
    bucket-name: ${AWS_S3_BUCKET_NAME:homelog-recipe-images}
    region: ${AWS_S3_REGION:ap-northeast-1}

mybatis:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/**/*.xml

jwt:
  secret: homelog-secret-key-must-be-at-least-32-characters-long
  access-expiration: 900000
  refresh-expiration: 604800000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha
  default-produces-media-type: application/json
