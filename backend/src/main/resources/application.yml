server:
  port: 8080

spring:
  application:
    name: api
  datasource:
    url: jdbc:postgresql://localhost:5432/homelog
    username: homelog
    password: homelog
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  web:
    resources:
      static-locations: classpath:/static/,file:./uploads/

app:
  upload:
    dir: uploads/recipes
  s3:
    bucket-name: ${AWS_S3_BUCKET_NAME:homelog-recipe-images}
    region: ${AWS_S3_REGION:ap-northeast-1}
  password-reset:
    # メール送信基盤（今後の検討事項）が実装されるまでのローカル開発専用フラグ。デフォルトはfalse。
    # ローカルで有効化したい場合のみ環境変数 APP_PASSWORD_RESET_LOG_TOKEN_ENABLED=true を設定する。
    # 共有・本番環境では絶対に有効化しないこと（有効にするとパスワードリセットの生トークンがログに出力される）。
    log-token-enabled: ${APP_PASSWORD_RESET_LOG_TOKEN_ENABLED:false}

mybatis:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/**/*.xml

jwt:
  # 本番・共有環境では必ず環境変数JWT_SECRETで上書きすること（既定値はローカル開発専用）。
  # このシークレットが漏洩すると任意のユーザーIDでアクセストークンを偽造できるため、
  # デフォルト値のまま共有環境で運用してはならない。
  secret: ${JWT_SECRET:homelog-secret-key-must-be-at-least-32-characters-long}
  access-expiration: 900000
  refresh-expiration: 604800000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha
  default-produces-media-type: application/json
